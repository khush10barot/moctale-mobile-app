name: moctale
description: A movie watchlist app built with Flutter.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: "^3.3.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  http: ^1.2.0
  google_maps_flutter: ^2.5.0
  cached_network_image: ^3.3.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
